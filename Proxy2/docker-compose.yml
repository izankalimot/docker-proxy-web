services:
  # Primer servidor web
  web1:
    image: nginx:alpine
    volumes:
      - ./web:/usr/share/nginx/html:ro

  # Segundo servidor web
  web2:
    image: nginx:alpine
    volumes:
      - ./web:/usr/share/nginx/html:ro

  # El Proxy que gestiona a ambos
  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web1
      - web2